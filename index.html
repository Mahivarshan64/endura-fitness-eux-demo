<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Endura Fitness Studio — Unisex A/C Gym in Dindigul</title>
<meta name="description" content="Endura Fitness Studio is Dindigul's premium unisex A/C gym. Motivating atmosphere, quality bodybuilding and fitness equipment, friendly coaching, and customized weight loss diet charts." />
<link rel="stylesheet" href="./colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--canvas); color: var(--fg1); }
  body { font-family: var(--font-body); }
  button { font-family: var(--font-body); }
  a { color: inherit; }

  /* Responsive helpers used inline by components */
  @media (max-width: 880px) {
    .mmm-desktop-nav { display: none !important; }
    .mmm-mobile-only { display: inline-flex !important; }
    .mmm-hide-mobile { display: none !important; }
    .mmm-hero-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
    .mmm-split-grid { grid-template-columns: 1fr !important; }
    .mmm-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
  }

  /* prevent horizontal scroll from translateX on carousel track */
  .mmm-testimonial-track { will-change: transform; }

  /* light scrollbar on dark */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--canvas); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hot); }

  /* Motion Principles */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.6s var(--ease-out) forwards;
  }
  .stagger-1 { animation-delay: 0.1s; }
  .stagger-2 { animation-delay: 0.2s; }
  .stagger-3 { animation-delay: 0.3s; }
  .stagger-4 { animation-delay: 0.4s; }
  
  /* Bento Layout Classes */
  .mmm-bento-grid {
    display: grid;
    grid-template-columns: repeat(1, 1fr);
    gap: 24px;
  }
  @media (min-width: 881px) {
    .mmm-bento-grid {
      grid-template-columns: repeat(12, 1fr);
    }
    .mmm-bento-card-0 { grid-column: span 7; }
    .mmm-bento-card-1 { grid-column: span 5; }
    .mmm-bento-card-2 { grid-column: span 5; }
    .mmm-bento-card-3 { grid-column: span 7; }
  }

  /* ── SCROLL REVEAL ──────────────────────────────────────────────────────── */
  .js-motion [data-reveal] {
    opacity: 0;
    transform: translateY(28px);
    transition:
      opacity  0.65s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .js-motion [data-reveal].is-revealed {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── PARALLAX ───────────────────────────────────────────────────────────── */
  [data-parallax] { will-change: transform; }

  /* ── REDUCED MOTION SAFETY NET ──────────────────────────────────────────── */
  @media (prefers-reduced-motion: reduce) {
    .js-motion [data-reveal],
    .js-motion [data-reveal].is-revealed { opacity: 1 !important; transform: none !important; transition: none !important; }
    [data-parallax] { transform: none !important; }
  }

  /* ═══════════════════════════════════════════════════════════════════════════
     PRELOADER
  ═══════════════════════════════════════════════════════════════════════════ */
  body.pre-lock { overflow: hidden; }

  #rf-preloader {
    position: fixed; inset: 0; z-index: 9999;
    background: #0B0B0B;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.55s cubic-bezier(0.16,1,0.3,1),
                transform 0.55s cubic-bezier(0.16,1,0.3,1);
  }
  #rf-preloader.is-out {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  /* center stack */
  .rf-pre-center {
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }

  /* dumbbell — outer handles lift, inner handles scale-in */
  .rf-pre-db-outer { animation: rfLift 0.55s cubic-bezier(0.16,1,0.3,1) 0.85s both; }
  .rf-pre-db-inner { animation: rfScale 0.55s cubic-bezier(0.16,1,0.3,1) 0.1s both; }

  @keyframes rfScale {
    from { opacity: 0; transform: scale(0.45); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes rfLift {
    0%   { transform: translateY(0); }
    42%  { transform: translateY(-16px); }
    100% { transform: translateY(0); }
  }

  /* wordmark */
  .rf-pre-name {
    font-family: "Big Shoulders Display", Impact, sans-serif;
    font-weight: 900;
    font-size: clamp(34px, 7vw, 72px);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #FAFAFA;
    overflow: hidden;
    line-height: 1;
  }
  .rf-pre-letter {
    display: inline-block;
    animation: rfLetterIn 0.38s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rfLetterIn {
    from { opacity: 0; transform: translateY(110%); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* location tag */
  .rf-pre-sub {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; color: #6B6B6B;
    animation: rfSubIn 0.5s cubic-bezier(0.16,1,0.3,1) 1.15s both;
  }
  @keyframes rfSubIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* progress bar */
  .rf-pre-progress-wrap {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.05);
  }
  .rf-pre-progress-bar {
    height: 100%; width: 0%;
    background: #FF2E2E;
    box-shadow: 0 0 12px rgba(255,46,46,0.5);
    animation: rfProgress 2.5s cubic-bezier(0.4,0,0.15,1) both;
  }
  @keyframes rfProgress { from { width: 0%; } to { width: 100%; } }

  /* reduced-motion: skip all preloader motion, just show then hide */
  @media (prefers-reduced-motion: reduce) {
    .rf-pre-db-outer, .rf-pre-db-inner,
    .rf-pre-letter, .rf-pre-sub        { animation: none !important; opacity: 1 !important; transform: none !important; }
    .rf-pre-progress-bar               { animation: none !important; width: 100% !important; }
    #rf-preloader.is-out               { transform: none !important; }
  }
</style>
</head>
<body class="pre-lock">

<!-- ════════════════════ PRELOADER ════════════════════ -->
<div id="rf-preloader">

  <div class="rf-pre-center">

    <!-- Dumbbell icon — two circular plates + bar -->
    <div class="rf-pre-db-outer">
      <div class="rf-pre-db-inner">
        <svg width="130" height="52" viewBox="0 0 130 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Left plate -->
          <circle cx="22" cy="26" r="20" fill="#FF2E2E"/>
          <circle cx="22" cy="26" r="11" fill="#0B0B0B"/>
          <!-- Bar -->
          <rect x="40" y="22" width="50" height="8" rx="4" fill="rgba(250,250,250,0.4)"/>
          <!-- Right plate -->
          <circle cx="108" cy="26" r="20" fill="#FF2E2E"/>
          <circle cx="108" cy="26" r="11" fill="#0B0B0B"/>
        </svg>
      </div>
    </div>

    <!-- Wordmark (letters split by JS for stagger) -->
    <div class="rf-pre-name">ENDURA</div>

    <!-- Location -->
    <div class="rf-pre-sub">· Suzuki Showroom, Dindigul ·</div>

  </div>

  <!-- Slim lime progress bar at very bottom -->
  <div class="rf-pre-progress-wrap">
    <div class="rf-pre-progress-bar"></div>
  </div>

</div>
<!-- ══════════════════════════════════════════════════ -->

<div id="app"></div>

<script src="motion.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Offerings.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="LocationFooter.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Schedule.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel" src="Faq.jsx"></script>
<script type="text/babel" src="Cta.jsx"></script>
<script type="text/babel">
  const { useState } = React;

  window.navigateTo = (page) => window.dispatchEvent(new CustomEvent("navigate", { detail: page }));

  function LandingPage() {
    const [active, setActive] = useState("Home");

    React.useEffect(() => {
      window.scrollTo(0, 0);
      // Only re-init scroll reveals on page navigation (not on first load —
      // the preloader exit script handles the first initMotion call).
      if (window.preloaderDone && window.initMotion) window.initMotion();
    }, [active]);

    React.useEffect(() => {
      const handleNav = (e) => setActive(e.detail);
      window.addEventListener("navigate", handleNav);
      return () => window.removeEventListener("navigate", handleNav);
    }, []);

    return (
      <div data-screen-label="Landing">
        <Navbar activeLink={active} onLinkClick={setActive} />
        <main>
          {active === "Home" && (
            <>
              <Hero />
              <Offerings />
              <SchedulePage />
              <Testimonials />
              <Faq />
              <Cta />
            </>
          )}
          {active === "Pricing" && (
            <>
              <Pricing />
              <Cta />
            </>
          )}
          {active === "Gallery" && (
            <>
              <Gallery />
              <Cta />
            </>
          )}
          {active === "About" && (
            <>
              <About />
              <Cta />
            </>
          )}
          {active === "Contact" && <Contact />}
        </main>
        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("app")).render(<LandingPage />);
</script>

<script>
/* ── Preloader: split letters + timed exit ─────────────────────────────── */
(function () {
  // Split ".rf-pre-name" text into per-letter <span>s for the stagger reveal
  var nameEl = document.querySelector('.rf-pre-name');
  if (nameEl) {
    var chars = nameEl.textContent.split('');
    nameEl.textContent = '';
    chars.forEach(function (ch, i) {
      var s = document.createElement('span');
      s.className = 'rf-pre-letter';
      s.textContent = ch === ' ' ? ' ' : ch;
      // Letters start at 0.6 s, each 48 ms apart
      s.style.animationDelay = (0.6 + i * 0.048) + 's';
      nameEl.appendChild(s);
    });
  }

  var MIN_MS = 2600; // minimum preloader display time
  var start  = Date.now();

  function exitPreloader() {
    var remaining = Math.max(0, MIN_MS - (Date.now() - start));
    setTimeout(function () {
      var el = document.getElementById('rf-preloader');
      if (!el) return;

      el.classList.add('is-out'); // triggers CSS fade + scale-down
      document.body.classList.remove('pre-lock'); // re-enable scroll

      // After exit animation, hide element and start scroll reveals
      setTimeout(function () {
        el.style.display = 'none';
        window.preloaderDone = true;
        if (window.initMotion) window.initMotion();
      }, 600);
    }, remaining);
  }

  // Exit when page is fully loaded OR after MIN_MS — whichever is later
  if (document.readyState === 'complete') {
    exitPreloader();
  } else {
    window.addEventListener('load', exitPreloader, { once: true });
  }
}());
</script>
</body>
</html>
